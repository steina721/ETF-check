<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ETF Check - Fixed Version</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #0f172a;
  color: white;
}

header {
  padding: 16px;
  font-size: 20px;
  font-weight: 600;
  background: #111c36;
  position: sticky;
  top: 0;
}

.container {
  padding: 12px;
  max-width: 100%;
}

.card {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 12px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

@media (min-width: 700px) {
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}

@media (min-width: 1100px) {
  .grid {
    grid-template-columns: 1fr 1fr 1fr;
  }
}

button {
  padding: 12px;
  font-size: 16px;
  border: 0;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  width: 100%;
}

button:active {
  transform: scale(0.98);
}

#status {
  margin-top: 10px;
  color: #93c5fd;
}

.table-wrapper {
  overflow-x: auto;
}

table {
  width: 100%;
  min-width: 500px;
  border-collapse: collapse;
}

td, th {
  padding: 8px;
  border-bottom: 1px solid #334155;
  text-align: left;
}
</style>
</head>

<body>

<header>ETF Check (Fix Version)</header>

<div class="container">

  <div class="card">
    <h3>Status</h3>
    <div id="status">Bereit</div>
  </div>

  <div class="card">
    <button onclick="loadData()">Daten laden</button>
  </div>

  <div class="grid">

    <div class="card">
      <h3>Performance</h3>
      <div id="performance">-</div>
    </div>

    <div class="card">
      <h3>Preis</h3>
      <div id="price">-</div>
    </div>

    <div class="card">
      <h3>Risiko</h3>
      <div id="risk">-</div>
    </div>

  </div>

  <div class="card table-wrapper">
    <h3>ETF Vergleich</h3>
    <table>
      <thead>
        <tr><th>ETF</th><th>1Y</th><th>TER</th></tr>
      </thead>
      <tbody id="tableBody">
        <tr><td>-</td><td>-</td><td>-</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>

// Safe error handling
window.onerror = function(msg) {
  document.getElementById("status").innerText = "Fehler: " + msg;
};

// SAFE FETCH (placeholder)
async function fetchETFData() {
  try {
    // TODO: replace with real API
    return {
      performance: "8.4%",
      price: "€123.45",
      risk: "mittel",
      table: [
        ["MSCI World", "8.4%", "0.20%"],
        ["S&P 500", "10.1%", "0.07%"]
      ]
    };
  } catch (e) {
    console.error(e);
    return null;
  }
}

function showLoading() {
  document.getElementById("status").innerText = "Lade...";
}

function showError(msg) {
  document.getElementById("status").innerText = "Fehler: " + msg;
}

async function loadData() {
  showLoading();

  const data = await fetchETFData();

  if (!data) {
    showError("Keine Daten");
    return;
  }

  document.getElementById("performance").innerText = data.performance;
  document.getElementById("price").innerText = data.price;
  document.getElementById("risk").innerText = data.risk;

  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  data.table.forEach(row => {
    const tr = document.createElement("tr");
    row.forEach(cell => {
      const td = document.createElement("td");
      td.innerText = cell;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  document.getElementById("status").innerText = "OK";
}

</script>

</body>
</html>
